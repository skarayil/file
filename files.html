<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles/app-layout.css">
<title>FileValley — Dosyalarım</title>
<script type="module" src="src/core/i18n.js"></script>
</head>

<body>
<div class="app-shell">
   <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1>FileValley</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="files.html" class="active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span>Dosyalarım</span>
            </a>
            <a href="shared.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                <span>Paylaşılanlar</span>
            </a>
            <a href="upload.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>Dosya Yükle</span>
            </a>
            <a href="sftp.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                <span>S-FTP Client</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-details"><div class="user-name" id="userName">Kullanıcı</div></div>
            </div>
            <div class="btn-logout-icon" id="logout" title="Çıkış Yap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div class="page-title-group">
                    <h2>Dosyalarım</h2>
                    <p class="page-subtitle">Tüm dosyalarınızı yönetin ve paylaşın</p>
                </div>
                <a href="upload.html" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" x2="12" y1="3" y2="15"></line>
                    </svg>
                    Yeni Dosya Yükle
                </a>
            </div>

            <div class="search-filter-bar">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Dosya ara...">
                </div>
                <div class="filter-controls">
                    <select id="sortFilter" class="filter-select">
                        <option value="date-desc">En Yeni</option>
                        <option value="date-asc">En Eski</option>
                        <option value="name-asc">İsim (A-Z)</option>
                        <option value="name-desc">İsim (Z-A)</option>
                    </select>
                    <select id="typeFilter" class="filter-select">
                        <option value="all">Tüm Dosyalar</option>
                        <option value="image">Görseller</option>
                        <option value="document">Belgeler</option>
                        <option value="video">Videolar</option>
                        <option value="audio">Ses Dosyaları</option>
                        <option value="archive">Arşivler</option>
                        <option value="other">Diğer</option>
                    </select>
                    <label class="group-toggle">
                        <input type="checkbox" id="groupByType">
                        <span>Türe Göre Grupla</span>
                    </label>
                    <div class="view-toggle">
                        <button id="viewList" class="view-btn active" title="Liste Görünümü">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="8" y1="6" x2="21" y2="6"></line>
                                <line x1="8" y1="12" x2="21" y2="12"></line>
                                <line x1="8" y1="18" x2="21" y2="18"></line>
                                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                <line x1="3" y1="18" x2="3.01" y2="18"></line>
                            </svg>
                        </button>
                        <button id="viewGrid" class="view-btn" title="Izgara Görünümü">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="status"></div>

            <div id="filesContainer">
                <!-- List View Table -->
                <table id="filesTable" class="files-table">
                    <thead>
                        <tr>
                            <th>Dosya Adı</th>
                            <th>Tür</th>
                            <th>Tarih</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="fileList">
                    </tbody>
                </table>
                
                <!-- Grid View -->
                <div id="filesGrid" class="files-grid" style="display: none;">
                </div>
            </div>
            <div id="loading">Yükleniyor...</div>
        </div>

        <div id="shareModal" class="modal">
            <div class="modal-content">
                <h3>Dosya Paylaş</h3>
                <p id="shareFileName" style="color:#666; font-size:0.9rem; margin-bottom:15px;"></p>

                <div class="form-group">
                    <label for="shareUsernames">Kullanıcı Adları (Virgülle ayırın)</label>
                    <input type="text" id="shareUsernames" placeholder="ornek1, arkadas2">
                </div>

                <div class="form-group">
                    <label for="shareExpires">Son Kullanma Tarihi (Opsiyonel)</label>
                    <input type="datetime-local" id="shareExpires">
                </div>

                <div class="form-group">
                    <label for="shareLimit">İndirme Hakkı (-1 limitsiz)</label>
                    <input type="number" id="shareLimit" value="-1">
                </div>

                <div class="modal-actions">
                    <button class="btn-cancel" id="closeModalBtn">İptal</button>
                    <button class="btn-confirm" id="confirmShareBtn">Paylaş</button>
                </div>
            </div>
        </div>

        <script type="module" src="src/pages/files.js"></script>
        </div>
    </main>
</div>
<script type="module" src="src/pages/files.js"></script>
</body>
</html>
