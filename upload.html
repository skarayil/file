<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles/app-layout.css">
<title>FileValley — Dosya Yükle</title>
<script type="module" src="src/core/i18n.js"></script>
</head>

<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1>FileValley</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="files.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span>Dosyalarım</span>
            </a>
            <a href="shared.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                <span>Paylaşılanlar</span>
            </a>
            <a href="upload.html" class="active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>Dosya Yükle</span>
            </a>
            <a href="sftp.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                <span>S-FTP Client</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-details"><div class="user-name" id="userName">Kullanıcı</div></div>
            </div>
            <div class="btn-logout-icon" id="logout" title="Çıkış Yap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div class="page-title-group">
                    <h2>Dosya Yükle</h2>
                    <p class="page-subtitle">Dosyalarınızı güvenli bir şekilde şifreleyip yükleyin</p>
                </div>
            </div>

        <div class="upload-grid">
            <!-- Left Column: Upload Area -->
            <div class="upload-sticky">
                <div class="upload-drop-zone">
                    <input type="file" multiple class="hidden" id="fileInput">
                    <label for="fileInput" class="upload-label">
                        <div class="upload-icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" x2="12" y1="3" y2="15"></line>
                            </svg>
                        </div>
                        <div class="text-center">
                            <p class="upload-text-main">Dosyaları buraya sürükleyin</p>
                            <p class="upload-text-sub">veya tarayıcıdan seçin</p>
                            <span class="btn-upload-select">Dosyaları Seç</span>
                        </div>
                    </label>
                </div>

                <!-- Action Button -->
                <button id="uploadBtn" class="btn btn-primary w-100" style="margin-top: 20px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="margin-right: 8px;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" x2="12" y1="3" y2="15"></line>
                    </svg>
                    Şifrele ve Yükle
                </button>
                <div id="status" style="margin-top: 10px;"></div>
            </div>

            <!-- Right Column: Queue & Status -->
            <div class="space-y-4">
                <div class="queue-header">
                    <h2 class="queue-title">Yükleme Kuyruğu (0)</h2>
                    <button class="btn-queue-clear">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 6px;">
                            <path d="M3 6h18"></path>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                        </svg>
                        Temizle
                    </button>
                </div>

                <!-- File List Container -->
                <div id="fileListQueue" class="space-y-4">
                    <!-- Items will be injected here via JS if needed, or by default just empty -->
                </div>

                <!-- Success/Share Card (Initially Hidden) -->
                <!-- Use existing logic. Existing JS writes to div id="status". I've kept it above. -->
            </div>
        </div>

        <script type="module" src="src/components/upload.js"></script>
        </div>
    </main>
</div>
<script type="module" src="src/components/upload.js"></script>
</body>
</html>
